<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order | Cafe Catering</title>
  <link rel="stylesheet" href="css/style3.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Cafe Catering</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="order">
      <h2>Place Your Catering Order</h2>
      <p>Fill out the form below to place your order. We’ll get back to you as soon as possible.</p>

      <form class="order-form">
        <!-- Personal Information -->
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        </div>

        <!-- Event Details -->
        <div class="form-group">
          <label for="event-type">Event Type</label>
          <select id="event-type" name="event-type" required>
            <option value="">Select an event type</option>
            <option value="birthday">Birthday Party</option>
            <option value="wedding">Wedding</option>
            <option value="corporate">Corporate Event</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="date">Event Date</label>
          <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
          <label for="guests">Number of Guests</label>
          <input type="number" id="guests" name="guests" placeholder="Enter the number of guests" min="1" required>
        </div>

        <!-- Menu Selection -->
        <div class="form-group">
          <label for="menu-items">Menu Items</label>
          <textarea id="menu-items" name="menu-items" rows="4" placeholder="List menu items or preferences here" required></textarea>
        </div>

        <!-- Special Requests -->
        <div class="form-group">
          <label for="special-requests">Special Requests</label>
          <textarea id="special-requests" name="special-requests" rows="3" placeholder="Any specific requests or dietary restrictions?"></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn">Submit Order</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Cafe Catering. All Rights Reserved.</p>
  </footer>
</body>
</html>
